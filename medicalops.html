<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedicalOps - Patient Portal</title>
<style>
  :root {
    --bg-dark: #0a0f18;
    --bg-surface: #0f172a;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --secondary: #334155;
  }

  body {
    margin: 0;
    font-family: monospace;
    background-color: var(--bg-dark);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Shared Header */
  header {
    background-color: var(--bg-surface);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    flex-shrink: 0;
    border-bottom: 1px solid #1e293b;
  }

  header h1 {
    margin: 0;
    font-size: 1.25rem;
    letter-spacing: 1px;
  }

  header h1 span {
    color: var(--primary);
  }

  .header-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  header button.call-btn {
    background-color: var(--danger);
    color: white;
    border: none;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }

  header button.call-btn:hover {
    background-color: var(--danger-hover);
  }

  header button.logout-btn {
    background-color: var(--secondary);
    color: white;
    border: none;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
    display: none; /* Hidden by default on login page */
  }

  header button.logout-btn:hover {
    background-color: #475569;
  }

  /* View Containers */
  .view {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }

  .view.active {
    display: flex;
  }

  /* Login Styles */
  #login-view {
    justify-content: center;
    align-items: center;
    padding: 2rem;
  }

  .login-card {
    background-color: var(--bg-surface);
    padding: 2rem;
    border-radius: 1rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    border: 1px solid #1e293b;
  }

  .login-card h2 {
    margin-top: 0;
    margin-bottom: 1.5rem;
    text-align: center;
    color: var(--primary);
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .form-group input {
    width: 100%;
    box-sizing: border-box;
    padding: 0.75rem;
    border-radius: 0.5rem;
    border: 1px solid #334155;
    background-color: #070b14;
    color: var(--text);
    font-family: monospace;
    outline: none;
  }

  .form-group input:focus {
    border-color: var(--primary);
  }

  #login-btn {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 0.5rem;
    background-color: var(--primary);
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 1rem;
    transition: opacity 0.2s;
  }

  #login-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .error-msg {
    color: var(--danger);
    font-size: 0.8rem;
    margin-top: 1rem;
    text-align: center;
    display: none;
  }

  /* Chat area */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .message {
    max-width: 80%;
    padding: 0.75rem 1rem;
    border-radius: 1rem;
    position: relative;
    line-height: 1.4;
  }

  .message.bot {
    background-color: #1e293b;
    align-self: flex-start;
    border-left: 4px solid var(--primary);
  }

  .message.user {
    background-color: var(--primary);
    align-self: flex-end;
    color: #fff;
    border-right: 4px solid var(--primary-hover);
  }

  .message-time {
    font-size: 0.65rem;
    margin-top: 0.25rem;
    color: var(--text-muted);
  }

  /* Input area */
  #input-container {
    display: flex;
    padding: 0.75rem;
    background-color: var(--bg-surface);
    flex-shrink: 0;
    gap: 0.5rem;
    border-top: 1px solid #1e293b;
  }

  #user-input {
    flex: 1;
    padding: 0.75rem;
    border-radius: 0.5rem;
    border: 1px solid var(--primary);
    background-color: #070b14;
    color: var(--text);
    font-family: monospace;
    outline: none;
  }

  #send-btn {
    padding: 0.75rem 1.25rem;
    border: none;
    border-radius: 0.5rem;
    background-color: var(--primary);
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  #send-btn:disabled {
    background-color: #374151;
    cursor: not-allowed;
  }

  /* Mobile responsiveness */
  @media (max-width: 600px) {
    header h1 {
      font-size: 1rem;
    }

    #user-input {
      font-size: 0.875rem;
      padding: 0.5rem;
    }

    #send-btn {
      padding: 0.5rem 0.75rem;
    }

    .login-card {
        padding: 1.5rem;
    }
  }
</style>
</head>
<body>

<header>
  <h1>MEDICAL<span>OPS</span></h1>
  <div class="header-actions">
    <button id="logout-btn" class="logout-btn" onclick="handleLogout()" aria-label="Logout">LOGOUT</button>
    <button class="call-btn" onclick="makeCall()" aria-label="Emergency Call">CALL</button>
  </div>
</header>

<!-- Login View -->
<div id="login-view" class="view active">
  <div class="login-card">
    <h2>SYSTEM LOGIN</h2>
    <div class="form-group">
      <label for="mrn">ENTER YOUR MEDICAL RECORD NUMBER</label>
      <input type="text" id="mrn" placeholder="ENTER MRN">
    </div>
    <button id="login-btn" onclick="handleLogin()">AUTHENTICATE</button>
    <div id="login-error" class="error-msg">Invalid Medical Record Number. Please try again.</div>
  </div>
</div>

<!-- Chat View -->
<div id="chat-view" class="view">
  <div id="chat-container">
    <div class="message bot">
      MedicalOps System Online. I am your post-discharge recovery assistant. How can I assist your health monitoring today?
      <div class="message-time">System</div>
    </div>
  </div>

  <div id="input-container">
    <input type="text" id="user-input" placeholder="Type your message..." aria-label="User message">
    <button id="send-btn" onclick="sendMessage()" disabled>SEND</button>
  </div>
</div>


<script>
  // DOM Elements
  const loginView = document.getElementById('login-view');
  const chatView = document.getElementById('chat-view');
  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const loginBtn = document.getElementById('login-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const loginError = document.getElementById('login-error');

  const API_BASE = "http://127.0.0.1:8000";
  let currentMRN = null;
  // --- Login Logic ---
  async function handleLogin() {
    const mrnField = document.getElementById('mrn');
    const mrn = mrnField.value.trim();

    if (!mrn) return;

    loginBtn.disabled = true;
    loginBtn.innerText = "AUTHENTICATING...";
    loginError.style.display = 'none';

    try {

      const response = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          mrn: mrn
        })
      });

      if (!response.ok) throw new Error("Login failed");

      const data = await response.json();

      if (data.status === "success") {
        currentMRN = mrn;   // store MRN for chat requests
        showChat();
      } else {
        throw new Error("Invalid MRN");
      }


    } catch (err) {
      console.error(err);
      loginError.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.innerText = "AUTHENTICATE";
    }
  }

  function handleLogout() {
    document.getElementById('mrn').value = '';
    userInput.value = '';

    const welcomeMsg = `<div class="message bot">MedicalOps System Online. I am your post-discharge recovery assistant. How can I assist your health monitoring today?<div class="message-time">System</div></div>`;
    chatContainer.innerHTML = welcomeMsg;

    loginView.classList.add('active');
    chatView.classList.remove('active');
    logoutBtn.style.display = 'none';

    loginBtn.disabled = false;
    loginBtn.innerText = "AUTHENTICATE";
  }

  function showChat() {
    loginView.classList.remove('active');
    chatView.classList.add('active');
    logoutBtn.style.display = 'block';
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  // --- Chat Logic ---

  userInput.addEventListener('input', () => {
    sendBtn.disabled = userInput.value.trim() === '';
  });

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage('user', text);
    userInput.value = '';
    sendBtn.disabled = true;

    try {

      const response = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          mrn: currentMRN,
          query: text
        })
      });

      if (!response.ok) throw new Error("Chat failed");

      const data = await response.json();

      addMessage('bot', data.response || "No response received.");

    } catch (error) {
      console.error(error);
      addMessage('bot', "System error contacting MedicalOps server.");
    }
  }

  function addMessage(type, text) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', type);
    msgDiv.innerHTML = text + `<div class="message-time">${type === 'bot' ? 'System' : 'You'}</div>`;
    chatContainer.appendChild(msgDiv);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function makeCall() {
    window.location.href = "tel:3522650111";
  }

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
  });

  document.getElementById('mrn').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
